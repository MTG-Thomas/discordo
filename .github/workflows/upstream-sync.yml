name: upstream-sync
on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  open-sync-pr:
    name: open upstream sync PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: git fetch https://github.com/ayn2op/discordo.git main:refs/remotes/upstream/main

      - name: Create sync branch
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="sync/upstream-main"
          git switch -C "$branch" origin/main
          git merge --no-edit upstream/main
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.sync.outputs.branch }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: sync upstream main" \
            --body "Fast-forward sync from ayn2op/discordo main into this fork." \
          || gh pr view "$BRANCH" --json url --jq .url
