# Whether to focus the message input automatically when a channel is selected.
# Set to false to preview channels without moving focus.
auto_focus = true

# Whether to enable mouse or not.
mouse = true
# The program to open when the `message_input.editor` keybind is pressed. Set the value to `"default"` to use `$EDITOR`.
editor = "default"

# "default" (unknown), "online", "dnd", "idle", "invisible", "offline"
status = "default"

hide_blocked_users = true
show_attachment_links = true

# Max members to be in the mention autocomplete suggestions list
# Note: Use autocomplete_limit = 0 to disable.
autocomplete_limit = 20

# The number of messages to fetch when a text-based channel is selected from guilds tree. The minimum and maximum value is 1 and 100, respectively.
messages_limit = 50

[markdown]
# Whether to parse and render markdown in messages or not.
enabled = true
# Theme for fenced code blocks. Available themes: https://xyproto.github.io/splash/docs
theme = "monokai"

[help]
# Show compact key modifiers in help, e.g. "^x" instead of "ctrl+x".
compact_modifiers = true
# [left, right]
padding = [1, 1]
separator = " • "

[picker]
width = 80
height = 25

[timestamps]
enabled = true
# https://pkg.go.dev/time#Layout
format = "3:04PM"

[date_separator]
enabled = true
# https://pkg.go.dev/time#Layout
format = "January 2, 2006"
# The fill character used on both sides of the date label.
character = "─"

[notifications]
enabled = true
# The duration of the sound. Set the value to `0` to use default duration. This is only supported on Unix and Windows.
duration = 0
[notifications.sound]
enabled = true
only_on_ping = true

[typing_indicator]
# Whether to send typing status or not.
send = true
# Whether to receive typing status or not.
receive = true

[sidebar.markers]
expanded = "▾ "
collapsed = "▸ "
leaf = ""

# Indentation for different item types.
[sidebar.indents]
dm = 2
group_dm = 1
guild = 2
category = 1
channel = 2
forum = 2

[icons]
guild_category = ""
guild_text = "#"
guild_voice = "♪ "
guild_stage_voice = "♪ "
guild_announcement_thread = "a-"
guild_public_thread = "› "
guild_private_thread = "› "
guild_announcement = "a-"
guild_forum = "≡ "
guild_store = "s-"

# Global shortcuts
# Esc: Reset message selection or close the channel selection popup.
[keybinds]
# Hide/show the guilds tree.
toggle_guilds_tree = ["f2", "ctrl+b"]
toggle_channels_picker = ["f3", "ctrl+k"]
toggle_help = "ctrl+."
focus_guilds_tree = ["f4", "ctrl+g"]
focus_messages_list = ["f5", "ctrl+t"]
focus_message_input = ["f6", "ctrl+i"]
# Cycle focus between the widgets.
focus_previous = ["shift+tab", "ctrl+h"]
focus_next = ["tab", "ctrl+l"]
# Log out and remove the authentication token from keyring.
# Requires re-login upon restart.
logout = "ctrl+d"
suspend = "ctrl+z"
quit = "ctrl+c"

[keybinds.picker]
cancel = "esc"
up = ["up", "ctrl+p"]
down = ["down", "ctrl+n"]
top = "home"
bottom = "end"
select = "enter"

# Only while focusing on the guilds tree
[keybinds.guilds_tree]
up = ["up", "k"]
down = ["down", "j"]
top = ["home", "g"]
bottom = ["end", "G"]
# Select the currently highlighted text-based channel or expand a guild or channel.
select_current = "enter"
yank_id = "i"
collapse_all = "_"
collapse_parent_node = "-"
move_to_parent_node = "p"

# Only while focusing on sent messages
[keybinds.messages_list]
select_up = "k"
select_down = "j"
select_top = ["home", "g"]
select_bottom = ["end", "G"]
# Scroll the messages list without changing the selection.
scroll_up = ["up", "K"]
scroll_down = ["down", "J"]
scroll_top = "home"
scroll_bottom = "end"
# Select the message reference (reply) of the selected channel.
select_reply = "s"
# Reply to the selected message.
reply = "R"
# Reply (with mention) to the selected message.
reply_mention = "r"
cancel = "esc"
edit = "e"
delete = "D"
delete_confirm = "d"
# Open the selected message's attachments or hyperlinks in the message
# using the default browser application.
open = "o"
# Yank (copy) the selected message's content/url/id.
yank_content = "y"
yank_url = "u"
yank_id = "i"

# Only while typing a message
# Alt+Enter: Insert a new line to the current text.
[keybinds.message_input]
# paste from clipboard (supports both text and images)
paste = "ctrl+v"
send = "enter"
# Remove existing text or cancel reply.
cancel = "esc"
# Complete usernames when mentioning
tab_complete = "ctrl+space"
undo = "ctrl+u"

open_editor = "ctrl+e"
open_file_picker = "ctrl+\\"

[keybinds.mentions_list]
up = ["up", "ctrl+p"]
down = ["down", "ctrl+n"]
top = "home"
bottom = "end"

# style = { foreground = "", background = "", attributes = "" or ["",""],  underline = "", underline_color = "" }
[theme]
background_style = { foreground = "#d6d3ca", background = "#0f1117" }

[theme.title]
alignment = "left"                                           # `"left"`, `"center"`, or `"right"`.
normal_style = { foreground = "#8c8a84" }
active_style = { foreground = "#f2efe7", attributes = "bold" }

[theme.footer]
alignment = "left"
normal_style = { foreground = "#8c8a84" }
active_style = { foreground = "#f2efe7", attributes = "bold" }

[theme.border]
enabled = true
padding = [0, 0, 1, 1] # [top, bottom, left, right]

normal_style = { foreground = "#5f6470" }
active_style = { foreground = "#7aa2f7" }

# `"hidden"`, `"plain"`, `"round"`, `"thick"`, or `"double"`.
normal_set = "round"
active_set = "round"

[theme.guilds_tree]
auto_expand_folders = true
# Give tree-like shape
graphics = true
graphics_color = "default"

# Direct-message recipient presence styles.
online_style = { foreground = "#7ccf8a" }
idle_style = { foreground = "#e0af68" }
dnd_style = { foreground = "#f7768e" }
offline_style = { foreground = "#8c8a84" }

[theme.scroll_bar]
visibility = "auto"
# "minimal", "box_drawing", or "unicode"
glyph_set = "unicode"
# Number of logical lines to move per mouse wheel tick.
scroll_step = 6
track_style = { foreground = "#3b3f4a" }
thumb_style = { foreground = "#7aa2f7" }

[theme.messages_list]
reply_indicator = ">"
forwarded_indicator = "<"

author_style = { foreground = "#f2efe7", attributes = "bold" }
mention_style = { foreground = "#7aa2f7", attributes = "bold" }
emoji_style = { foreground = "#7ccf8a" }
url_style = { foreground = "#7aa2f7" }
attachment_style = { foreground = "#e0af68" }
message_style = { foreground = "#d6d3ca", background = "#0f1117" }
selected_message_style = { foreground = "#f2efe7", background = "#253044" }

[theme.messages_list.embeds]
provider_style = { foreground = "#8c8a84", attributes = "italic" }
author_style = { foreground = "#b7b2a8", attributes = "italic" }
title_style = { foreground = "#7aa2f7", attributes = "bold" }
description_style = { foreground = "#d6d3ca" }
field_name_style = { foreground = "#f2efe7", attributes = ["bold", "underline"] }
field_value_style = { foreground = "#d6d3ca" }
footer_style = { foreground = "#8c8a84", attributes = "italic" }
url_style = { foreground = "#7aa2f7", underline = "solid" }

[theme.mentions_list]
# Note: width and height are capped to the avaliable space
# Minimum width
# 0 = make the list as wide as possible
min_width = 20
# Maximum height
# 0 = make the list as tall as needed
max_height = 0

[theme.dialog]
style = { foreground = "#d6d3ca", background = "#151820" }
# Background style: everything else behind the dialog
background_style = { attributes = "dim" }

[theme.help]
short_key_style = { foreground = "#7aa2f7" }
short_desc_style = { foreground = "#d6d3ca" }
full_key_style = { foreground = "#7aa2f7" }
full_desc_style = { foreground = "#d6d3ca" }
